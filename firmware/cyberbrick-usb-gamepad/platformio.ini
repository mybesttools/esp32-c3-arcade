[platformio]
default_envs = cyberbrick_esp32c3_usbserial

[env:cyberbrick_esp32c3_usbserial]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
  -D CONTROLLER_MODE_USB_SERIAL
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =

; ESP32-C3 cannot present as native USB HID gamepad.
; This mode streams controller state over USB CDC serial for Pi-side uinput bridge.

[env:cyberbrick_esp32c3_ble]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
  -include Arduino.h
  -D CONTROLLER_MODE_BLE
lib_deps =
  lemmingdev/ESP32-BLE-Gamepad @ ^0.6.4

; ESP32-C3 does not support native USB HID gamepad mode like RP2040/ESP32-S3.
; This environment uses BLE HID gamepad mode.

[env:usb_hid_reference_rp2040]
platform = raspberrypi
board = pico
framework = arduino
monitor_speed = 115200
lib_deps =
  adafruit/Adafruit TinyUSB Library @ ^3.4.5
